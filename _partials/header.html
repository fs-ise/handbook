<div id="custom-header-container"></div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const original = document.getElementById("title-block-header");
  const target = document.getElementById("custom-header-container");

  if (!original || !target) return;

  // Remove keywords block
  const keywords = original.querySelector(".keywords");
  if (keywords) {
    keywords.remove();
  }

  const meta = original.querySelector(".quarto-title-meta");

  // Remove "Published"
  if (meta) {
    Array.from(meta.children).forEach(block => {
      const heading = block.querySelector(".quarto-title-meta-heading");
      if (heading && heading.textContent.trim() === "Published") {
        block.remove();
      }
    });
  }

  // Extract DOI
  let doiBlock = null;

  if (meta) {
    Array.from(meta.children).forEach(block => {
      const heading = block.querySelector(".quarto-title-meta-heading");
      if (heading && heading.textContent.trim().toLowerCase() === "doi") {
        doiBlock = block;
        block.remove();
      }
    });
  }

  // Clean meta + determine authors node
  let authorsNode = meta;

  if (meta) {
    const blocks = Array.from(meta.children);

    // Remove empty blocks
    blocks.forEach(block => {
      const contents = block.querySelector(".quarto-title-meta-contents");
      if (!contents || contents.textContent.trim() === "") {
        block.remove();
      }
    });

    const remainingBlocks = Array.from(meta.children);

    // If only authors remain → unwrap
    if (remainingBlocks.length === 1) {
      const onlyBlock = remainingBlocks[0];
      const contents = onlyBlock.querySelector(".quarto-title-meta-contents");

      if (contents) {
        meta.replaceWith(contents);
        authorsNode = contents;
      }
    }

    // If nothing remains → remove entirely
    if (meta.children.length === 0) {
      meta.remove();
      authorsNode = null;
    }
  }

  // Move authors directly under title
  const quartoTitle = original.querySelector(".quarto-title");
  const h1 = quartoTitle?.querySelector("h1.title");

  if (authorsNode && quartoTitle && h1) {
    h1.insertAdjacentElement("afterend", authorsNode);
  }

  // Move full header into custom container
  target.appendChild(original);

  // Append DOI at bottom of header
  if (doiBlock) {
    doiBlock.classList.add("pub-doi");
    original.appendChild(doiBlock);
  }

  // ORCID links → open in new tab
  const orcidLinks = original.querySelectorAll(".quarto-title-author-orcid");
  orcidLinks.forEach(link => {
    link.setAttribute("target", "_blank");
    link.setAttribute("rel", "noopener noreferrer");
  });

});
</script>
