format:
  html:
    theme:
      light: cosmo
      dark: slate
    dark-mode-toggle: true
    css: assets/styles.css
    toc: true
    toc-depth: 3
    code-fold: true
    smooth-scroll: true
    code-tools: false
    grid:
      sidebar-width: 280px
      body-width: 1000px
      margin-width: 280px
      gutter-width: 1.5rem
    include-after-body:
      - assets/scripts/weekend-mode.js
      - assets/scripts/sidebar-active-section.js
    highlight-style: github
    mermaid:
      theme: neutral

resources:
  - assets/calendar/fs-ise.ical

extensions:
  iconify:
    style: "color: #002EFF;"

execute:
  freeze: auto

filters:
  - custom-callout

custom-callout:
  resource:
    title: "Resource"
    icon: true
    icon-symbol: "🔗"
    color: "#0d6efd"
  confidential:
    title: "Confidential"
    icon: true
    icon-symbol: "🔒"
    color: "#dc3545"
  objective:
    title: "Objective"
    icon: true
    icon-symbol: "🎯"
    color: "#0d6efd"
  self-service:
    title: "Self-service"
    icon: true
    icon-symbol: "🛠️"
    color: "#198754"

handbook:
  url: "https://github.com/fs-ise/handbook"